<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Kanban Docker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f5f7; display: flex; justify-content: center; padding: 20px; }
        .board { display: flex; gap: 20px; }
        .column { background: #ebecf0; border-radius: 5px; width: 250px; padding: 10px; min-height: 400px; }
        .column h3 { text-align: center; color: #172b4d; }
        .card { background: white; padding: 10px; margin: 10px 0; border-radius: 3px; box-shadow: 0 1px 0 rgba(9,30,66,.25); }
    </style>
</head>
<body>
    <div class="board">     
       <div class="column"><h3>Aberto</h3><div id="todo"></div></div>
       <div class="column"><h3>Pregão</h3><div id="todo"></div></div>
       <div class="column"><h3>Lance</h3><div id="todo"></div></div>
       <div class="column"><h3>Habilitação</h3><div id="todo"></div></div>
       <div class="column"><h3>Empenho</h3><div id="todo"></div></div>
       <div class="column"><h3>Concluído</h3><div id="todo"></div></div>
    </div>

    <script>
        // Busca as tarefas do Back-end usando o IP da rede do Docker
        fetch('http://localhost:5000/api/tasks')
            .then(res => res.json())
            .then(tasks => {
                tasks.forEach(task => {
                    const container = document.getElementById(task.status);
                    if (container) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerText = task.title;
                        container.appendChild(card);
                    }
                });
            });
    </script>
</body>
</html>
